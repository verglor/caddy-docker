name: Sync Upstream Docker Image

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

env:
  UPSTREAM_IMAGE: library/caddy
  TAG_FILTER: '^(\d+\.\d+\.\d+-)?builder-alpine'
  REGISTRY: docker.io
  MY_IMAGE: verglor/caddy

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Verify Docker Hub login
        run: |
          # Verify credentials are valid by checking Docker Hub API
          TOKEN_RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null -u "${{ secrets.DOCKER_HUB_USERNAME }}":"${{ secrets.DOCKER_HUB_TOKEN }}" "https://hub.docker.com/v2/repositories/library/caddy/")
          if [ "$TOKEN_RESPONSE" != "200" ]; then
            echo "::error::Docker Hub authentication failed. Please check your credentials."
            exit 1
          fi
          echo "✓ Docker Hub login verified"

      - name: Fetch upstream tags and digests
        id: upstream-digests
        run: |
          echo "Fetching tags and digests for: $UPSTREAM_IMAGE"

          URL="https://hub.docker.com/v2/repositories/${UPSTREAM_IMAGE}/tags?page_size=100"

          declare -A DIGEST_TAGS

          while [ "$URL" != "null" ] && [ -n "$URL" ]; do
            RESPONSE=$(curl -s "$URL")

            # Process each tag in this page
            for TAG in $(echo "$RESPONSE" | jq -r '.results[].name'); do
              # Filter by regex
              if ! echo "$TAG" | grep -qE "$TAG_FILTER"; then
                continue
              fi

              # Get digest for this tag
              DIGEST=$(echo "$RESPONSE" | jq -r ".results[] | select(.name == \"$TAG\") | .images[0].digest // empty")

              if [ -n "$DIGEST" ]; then
                DIGEST_TAGS[$DIGEST]="${DIGEST_TAGS[$DIGEST]} $TAG"
                echo "  $TAG -> $DIGEST"
              fi
            done

            URL=$(echo "$RESPONSE" | jq -r '.next')
          done

          echo ""
          echo "Tags grouped by digest:"
          for DIGEST in "${!DIGEST_TAGS[@]}"; do
            echo "  $DIGEST: ${DIGEST_TAGS[$DIGEST]}"
          done

          # Output grouped digests and tags
          for DIGEST in "${!DIGEST_TAGS[@]}"; do
            echo "DIGEST_TAGS<<EOF" >> $GITHUB_ENV
            echo "${DIGEST}=${DIGEST_TAGS[$DIGEST]}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          done

      - name: Build and push new tags
        run: |
          # Parse DIGEST_TAGS environment variable
          while IFS='=' read -r DIGEST TAGS; do
            # Skip empty lines
            [ -z "$DIGEST" ] && continue

            # Trim whitespace
            DIGEST=$(echo "$DIGEST" | xargs)
            TAGS=$(echo "$TAGS" | xargs)

            # Remove "builder-" from each tag
            CLEANED_TAGS=""
            for TAG in $TAGS; do
              CLEANED_TAG=$(echo "$TAG" | sed 's/builder-//')
              CLEANED_TAGS="${CLEANED_TAGS} ${CLEANED_TAG}"
            done
            CLEANED_TAGS=$(echo "$CLEANED_TAGS" | xargs)

            echo "Processing digest: $DIGEST"
            echo "  Tags: $CLEANED_TAGS"

            # Get first cleaned tag as reference
            FIRST_TAG=$(echo "$CLEANED_TAGS" | cut -d' ' -f1)
            REFERENCE_IMAGE="${REGISTRY}/${MY_IMAGE}:${FIRST_TAG}"

            # Check if we already built with the same upstream digest
            SKIP_BUILD=false
            if docker manifest inspect "$REFERENCE_IMAGE" > /dev/null 2>&1; then
              EXISTING_DIGEST=$(docker inspect "$REFERENCE_IMAGE" --format '{{index .Config.Labels "upstream.digest"}}')
              if [ "$EXISTING_DIGEST" = "$DIGEST" ]; then
                SKIP_BUILD=true
                echo "  ✓ Already built with same upstream digest, skipping build"
                docker pull "$REFERENCE_IMAGE"
              else
                echo "  → Upstream digest changed, rebuilding..."
                echo "    Old: $EXISTING_DIGEST"
                echo "    New: $DIGEST"
              fi
            fi

            # Build only if needed
            if [ "$SKIP_BUILD" = "false" ]; then
              # Get original tag for build-arg (first in original list)
              ORIGINAL_FIRST=$(echo "$TAGS" | cut -d' ' -f1)

              echo "  → Building: $ORIGINAL_FIRST -> $FIRST_TAG"
              docker build \
                --build-arg TAG="$ORIGINAL_FIRST" \
                --build-arg UPSTREAM_IMAGE="$UPSTREAM_IMAGE" \
                --build-arg UPSTREAM_DIGEST="$DIGEST" \
                -t "$REFERENCE_IMAGE" .

              docker push "$REFERENCE_IMAGE"
              echo "  ✓ Pushed: $REFERENCE_IMAGE"
            fi

            # Tag and push all cleaned tags
            for CLEANED_TAG in $CLEANED_TAGS; do
              FULL_IMAGE="${REGISTRY}/${MY_IMAGE}:${CLEANED_TAG}"
              if [ "$CLEANED_TAG" != "$FIRST_TAG" ]; then
                docker tag "$REFERENCE_IMAGE" "$FULL_IMAGE"
                docker push "$FULL_IMAGE"
                echo "  ✓ Pushed: $FULL_IMAGE"
              fi
            done

          done <<< "$(echo '$DIGEST_TAGS' | tr ' ' '\n')"
          
          
